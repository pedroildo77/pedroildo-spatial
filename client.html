<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedroildo Spatial • Client Viewer Premium</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    :root{
      --bg:#06080c;
      --bg2:#0c1118;
      --panel:rgba(10,14,20,.60);
      --panel-strong:rgba(10,14,20,.78);
      --line:rgba(255,255,255,.10);
      --text:#f4f7ff;
      --muted:#b7c0d4;
      --gold:#d8b46b;
      --gold-2:#9b7541;
      --shadow:0 18px 60px rgba(0,0,0,.35);
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      height:100%;
      overflow:hidden;
      font-family:Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 18% 16%, rgba(216,180,107,.12), transparent 20%),
        radial-gradient(circle at 80% 12%, rgba(116,156,255,.12), transparent 22%),
        linear-gradient(180deg, var(--bg2) 0%, var(--bg) 100%);
    }

    #app{
      position:relative;
      width:100%;
      height:100%;
    }

    model-viewer{
      width:100%;
      height:100%;
      background:
        radial-gradient(circle at 35% 30%, rgba(255,255,255,.05), transparent 20%),
        radial-gradient(circle at 70% 18%, rgba(216,180,107,.08), transparent 16%),
        linear-gradient(180deg, #121924 0%, #0a0e14 100%);
      --poster-color:#0a0e14;
      --progress-bar-color:#d8b46b;
      --progress-mask:rgba(255,255,255,.08);
    }

    .hero{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:5;
      background:
        radial-gradient(circle at 50% 82%, rgba(255,255,255,.04), transparent 26%),
        linear-gradient(180deg, rgba(0,0,0,.22) 0%, rgba(0,0,0,0) 30%, rgba(0,0,0,.24) 100%);
    }

    .topbar{
      position:absolute;
      top:18px;
      left:18px;
      right:18px;
      display:flex;
      justify-content:space-between;
      gap:12px;
      z-index:20;
      pointer-events:none;
    }

    .brand,.actions,.meta,.loading,.toast,.qr-box{
      pointer-events:auto;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      min-width:260px;
      padding:14px 16px;
      border:1px solid var(--line);
      border-radius:18px;
      background:var(--panel);
      backdrop-filter:blur(18px);
      box-shadow:var(--shadow);
    }

    .badge{
      width:46px;
      height:46px;
      border-radius:14px;
      display:grid;
      place-items:center;
      font-weight:800;
      color:#111;
      letter-spacing:.04em;
      background:linear-gradient(135deg,#f7e0a2,#d8b46b 55%,#9b7541);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.45);
    }

    .brand h1{
      margin:0;
      font-size:15px;
      line-height:1.1;
      letter-spacing:.02em;
    }

    .brand p{
      margin:4px 0 0;
      color:var(--muted);
      font-size:12px;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .btn{
      appearance:none;
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px 14px;
      background:var(--panel);
      color:var(--text);
      font:inherit;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      backdrop-filter:blur(18px);
      box-shadow:var(--shadow);
      transition:transform .18s ease,border-color .18s ease,background .18s ease,opacity .18s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      border-color:rgba(216,180,107,.45);
    }

    .btn.primary{
      color:#111;
      font-weight:700;
      background:linear-gradient(135deg, rgba(216,180,107,.98), rgba(155,117,65,.98));
    }

    .bottom{
      position:absolute;
      left:18px;
      right:18px;
      bottom:18px;
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:12px;
      z-index:20;
      pointer-events:none;
    }

    .meta{
      max-width:min(560px, calc(100vw - 36px));
      padding:20px 22px;
      border:1px solid var(--line);
      border-radius:24px;
      background:var(--panel);
      backdrop-filter:blur(18px);
      box-shadow:var(--shadow);
    }

    .meta .eyebrow{
      color:var(--gold);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.12em;
      margin-bottom:10px;
      display:block;
      opacity:.95;
    }

    .meta h2{
      margin:0 0 8px;
      font-size:clamp(24px, 4vw, 42px);
      line-height:1;
      letter-spacing:-.03em;
    }

    .meta p{
      margin:0 0 16px;
      color:var(--muted);
      font-size:14px;
      line-height:1.6;
    }

    .meta-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .side-stack{
      display:flex;
      flex-direction:column;
      gap:12px;
      align-items:flex-end;
      pointer-events:auto;
    }

    #arBtn{
      min-width:190px;
    }

    .hint{
      padding:10px 14px;
      border:1px solid var(--line);
      border-radius:14px;
      background:var(--panel);
      backdrop-filter:blur(18px);
      box-shadow:var(--shadow);
      color:var(--muted);
      font-size:12px;
      line-height:1.5;
      max-width:280px;
      text-align:right;
    }

    .qr-box{
      padding:12px;
      border:1px solid var(--line);
      border-radius:18px;
      background:var(--panel-strong);
      backdrop-filter:blur(18px);
      box-shadow:var(--shadow);
      width:150px;
    }

    .qr-box .qr-title{
      font-size:11px;
      color:var(--gold);
      text-transform:uppercase;
      letter-spacing:.08em;
      margin-bottom:8px;
    }

    .qr-box canvas,
    .qr-box img{
      width:100%;
      height:auto;
      display:block;
      border-radius:10px;
      background:white;
      padding:6px;
    }

    .loading{
      position:absolute;
      inset:0;
      z-index:25;
      display:grid;
      place-items:center;
      background:rgba(7,9,13,.36);
      backdrop-filter:blur(6px);
      transition:opacity .3s ease, visibility .3s ease;
    }

    .loading.hidden{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    .loading-card{
      padding:26px 30px;
      border-radius:24px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(9,12,17,.78);
      box-shadow:var(--shadow);
      text-align:center;
      min-width:280px;
    }

    .spinner{
      width:42px;
      height:42px;
      margin:0 auto 14px;
      border-radius:50%;
      border:3px solid rgba(255,255,255,.14);
      border-top-color:var(--gold);
      animation:spin 1s linear infinite;
    }

    @keyframes spin{
      to{transform:rotate(360deg)}
    }

    .loading-title{
      font-size:18px;
      font-weight:700;
      margin-bottom:6px;
    }

    .loading-sub{
      font-size:13px;
      color:var(--muted);
    }

    .toast{
      position:absolute;
      left:50%;
      top:88px;
      transform:translateX(-50%) translateY(-10px);
      opacity:0;
      transition:opacity .22s ease, transform .22s ease;
      z-index:30;
      padding:12px 16px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(13,16,22,.95);
      box-shadow:var(--shadow);
      max-width:calc(100vw - 40px);
      text-align:center;
      pointer-events:none;
    }

    .toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    @media (max-width: 980px){
      .topbar,
      .bottom{
        flex-direction:column;
        align-items:stretch;
      }

      .actions{
        justify-content:flex-start;
      }

      .meta{
        max-width:none;
      }

      .side-stack{
        align-items:stretch;
      }

      .hint{
        max-width:none;
        text-align:left;
      }

      #arBtn{
        width:100%;
      }

      .qr-box{
        width:100%;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <model-viewer
      id="viewer"
      src=""
      ios-src=""
      alt="Modelo 3D"
      camera-controls
      auto-rotate
      auto-rotate-delay="0"
      rotation-per-second="12deg"
      ar
      ar-modes="webxr scene-viewer quick-look"
      ar-scale="fixed"
      ar-placement="floor"
      xr-environment
      shadow-intensity="1.15"
      shadow-softness="0.85"
      exposure="1.15"
      environment-image="neutral"
      interaction-prompt="auto"
      camera-orbit="35deg 72deg auto"
      field-of-view="26deg"
      min-camera-orbit="auto 45deg auto"
      max-camera-orbit="auto 90deg auto"
      loading="eager"
      reveal="auto"
      seamless-poster>
    </model-viewer>

    <div class="hero"></div>

    <div class="topbar">
      <div class="brand">
        <div class="badge">PI</div>
        <div>
          <h1>Pedroildo Spatial</h1>
          <p>Visualização artística em 3D e AR</p>
        </div>
      </div>

      <div class="actions">
        <button id="rotateBtn" class="btn">Auto-rotação</button>
        <button id="fullscreenBtn" class="btn">Fullscreen</button>
      </div>
    </div>

    <div class="bottom">
      <div class="meta">
        <span class="eyebrow">Projeto</span>
        <h2 id="projectTitle">A carregar...</h2>
        <p id="projectDesc">Preparar modelo e ambiente visual.</p>

        <div class="meta-actions">
          <a id="contactBtn" class="btn" href="#" target="_blank" rel="noopener">Pedir orçamento</a>
          <button id="copyLinkBtn" class="btn">Copiar link</button>
        </div>
      </div>

      <div class="side-stack">
        <button id="arBtn" class="btn primary">Ver no espaço</button>

        <div class="hint" id="arHint">
          Em telemóveis compatíveis, este botão abre a experiência AR com a câmara.
        </div>

        <div class="qr-box">
          <div class="qr-title">QR do projeto</div>
          <img id="qrImg" alt="QR code do projeto" />
        </div>
      </div>
    </div>

    <div id="loading" class="loading">
      <div class="loading-card">
        <div class="spinner"></div>
        <div class="loading-title">Pedroildo Spatial</div>
        <div class="loading-sub" id="loadingText">A carregar experiência...</div>
      </div>
    </div>

    <div id="toast" class="toast"></div>
  </div>

  <script>
    const API = "http://localhost:3000";
    const params = new URLSearchParams(window.location.search);
    const projectId = params.get("project");

    const viewer = document.getElementById("viewer");
    const projectTitle = document.getElementById("projectTitle");
    const projectDesc = document.getElementById("projectDesc");
    const loading = document.getElementById("loading");
    const loadingText = document.getElementById("loadingText");
    const toast = document.getElementById("toast");
    const rotateBtn = document.getElementById("rotateBtn");
    const fullscreenBtn = document.getElementById("fullscreenBtn");
    const arBtn = document.getElementById("arBtn");
    const arHint = document.getElementById("arHint");
    const copyLinkBtn = document.getElementById("copyLinkBtn");
    const contactBtn = document.getElementById("contactBtn");
    const qrImg = document.getElementById("qrImg");

    let autoRotateOn = true;

    init();

    async function init(){
      generateQR(window.location.href);

      if(!projectId){
        projectTitle.textContent = "Projeto não definido";
        projectDesc.textContent = "Abre esta página com ?project=1";
        loading.classList.add("hidden");
        arBtn.disabled = true;
        contactBtn.href = "#";
        return;
      }

      try{
        loadingText.textContent = "A carregar projeto...";
        const project = await fetch(`${API}/api/project/${projectId}`).then(r => r.json());
        const model = await fetch(`${API}/api/project/${projectId}/model`).then(r => r.json());

        if(project){
          projectTitle.textContent = project.name || `Projeto ${projectId}`;
          projectDesc.textContent = project.description || "Experiência 3D imersiva.";
        } else {
          projectTitle.textContent = `Projeto ${projectId}`;
          projectDesc.textContent = "Projeto carregado.";
        }

        if(!model){
          projectDesc.textContent = "Este projeto ainda não tem modelo associado.";
          loading.classList.add("hidden");
          arBtn.disabled = true;
          return;
        }

        viewer.src = API + model.url;

        if(model.usdz_path){
          viewer.setAttribute("ios-src", API + "/models/" + model.usdz_path);
        }

        contactBtn.href = `mailto:pedroildo@pedroildo.com?subject=Pedido%20de%20orçamento%20-%20${encodeURIComponent(projectTitle.textContent)}`;

      } catch(e){
        console.error(e);
        projectTitle.textContent = "Erro ao carregar";
        projectDesc.textContent = "Não foi possível carregar a experiência.";
        loading.classList.add("hidden");
        arBtn.disabled = true;
      }
    }

    viewer.addEventListener("load", () => {
      loading.classList.add("hidden");
      showToast("Modelo carregado");
      refreshARState();
    });

    viewer.addEventListener("error", (e) => {
      console.error(e);
      loading.classList.add("hidden");
      projectDesc.textContent = "Erro ao abrir o modelo.";
      arBtn.disabled = true;
      showToast("Erro ao abrir o modelo");
    });

    rotateBtn.addEventListener("click", () => {
      autoRotateOn = !autoRotateOn;
      viewer.autoRotate = autoRotateOn;
      showToast(autoRotateOn ? "Auto-rotação ligada" : "Auto-rotação desligada");
    });

    fullscreenBtn.addEventListener("click", async () => {
      if (!document.fullscreenElement) {
        await document.documentElement.requestFullscreen();
      } else {
        await document.exitFullscreen();
      }
    });

    copyLinkBtn.addEventListener("click", async () => {
      try{
        await navigator.clipboard.writeText(window.location.href);
        showToast("Link copiado");
      } catch(e){
        console.error(e);
        showToast("Não foi possível copiar o link");
      }
    });

    arBtn.addEventListener("click", async () => {
      try{
        if(typeof viewer.activateAR !== "function"){
          showToast("AR não disponível neste browser");
          return;
        }
        await viewer.activateAR();
      } catch(e){
        console.error(e);
        showToast("AR indisponível aqui. Usa HTTPS e telemóvel compatível.");
      }
    });

    async function refreshARState(){
      try{
        await customElements.whenDefined("model-viewer");

        const secure = window.isSecureContext;
        const hasActivate = typeof viewer.activateAR === "function";
        const canAR = "canActivateAR" in viewer ? !!viewer.canActivateAR : false;

        if(!secure){
          arHint.textContent = "Para AR real, abre esta página em HTTPS num telemóvel compatível.";
          arBtn.disabled = true;
          return;
        }

        if(hasActivate && canAR){
          arHint.textContent = "AR disponível neste dispositivo.";
          arBtn.disabled = false;
        } else if(hasActivate){
          arHint.textContent = "O browser suporta parcialmente AR. Testa num telemóvel compatível.";
          arBtn.disabled = false;
        } else {
          arHint.textContent = "AR não suportado neste dispositivo/browser.";
          arBtn.disabled = true;
        }
      } catch(e){
        console.error(e);
        arHint.textContent = "Não foi possível verificar o suporte AR.";
        arBtn.disabled = true;
      }
    }

    function generateQR(text){
      const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(text)}`;
      qrImg.src = qrUrl;
    }

    function showToast(message){
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toast.classList.remove("show"), 1800);
    }
  </script>
</body>
</html>
